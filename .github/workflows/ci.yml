name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pipx install ruff
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest

  extensions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build browser extensions
        run: subcRiSS/build.sh subcRiSS dist

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: subcRiSS-extensions
          path: dist/*.zip
          if-no-files-found: error

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: yt2rss:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the image boots and serves /healthz
        run: |
          docker run -d --name yt2rss -e YT2RSS_CACHE_MODE=none -p 8000:8000 yt2rss:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/healthz; then echo " OK"; exit 0; fi
            sleep 2
          done
          echo "healthz never came up"; docker logs yt2rss; exit 1
